<html>
<body>

<script>

let saque = +prompt("Digite o valor do saque:");

if (saque >= 10 && saque <= 600) {

    let notas100 = +(saque / 100);
    saque = saque % 100;

    let notas50 = +(saque / 50);
    saque = saque % 50;

    let notas10 = +(saque / 10);
    saque = saque % 10;

    let notas5 = +(saque / 5);
    saque = saque % 5;

    let notas1 = +(saque / 1);

    console.log("Notas de 100: " + notas100);
    console.log("Notas de 50: " + notas50);
    console.log("Notas de 10: " + notas10);
    console.log("Notas de 5: " + notas5);
    console.log("Notas de 1: " + notas1);

} else {
    console.log("Valor inválido. O saque deve ser entre 10 e 600 reais.");
}

</script>

</body>
</html>
