<html>
    <body>
        <script>
            let peso = +prompt('Escreva o peso: ')
            let altura = +prompt('Escreva a altura: ')
            
            let imc = peso / (altura * altura)

            if (imc < 18.5) {
                console.log('Abaixo do peso')
            } 
            else if (imc >= 18.5 && imc < 25) {
                console.log('Normal')
            } 
            else if (imc >= 25 && imc < 30.1) {
                console.log('Acima do peso')
            } 
            else {
                console.log('Obeso')
            }

        </script>
    </body>
</html>
